# CI — runs on every push to main and on pull requests.
#
# Two parallel jobs:
#   backend  — pytest against the Flask API (33 round-trip + brief renderer tests)
#   frontend — TypeScript typecheck + ESLint
#
# Goal: nothing merges to main with a broken backend edit pipeline or a
# TypeScript regression. Frontend currently has no Vitest suite — when
# we add one, drop it into the frontend job.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same ref so a quick second push doesn't
# burn CI minutes on a soon-to-be-stale commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: planner/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            planner/backend/requirements.txt
            planner/backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        # -ra shows reasons for skips/xfails so we know if the laser fixture
        # gates trip in CI (they currently do — simple.miz has no laser units).
        run: pytest -ra --tb=short

  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: planner/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: planner/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        # Match Railway's build (`tsc -b && vite build`) exactly. Plain
        # `tsc --noEmit -p tsconfig.json` only resolves the root config
        # which has `files: []` and project references — it does NOT
        # compile the referenced configs, so noUnusedLocals violations
        # in tsconfig.app.json slipped through CI and only blew up on
        # Railway. Using `-b` makes CI honour the referenced projects'
        # compilerOptions like Railway does. noEmit is already true in
        # tsconfig.app.json so this stays type-check-only.
        run: npx tsc -b

      - name: Vitest
        # Frontend unit tests (currently editStore actions only — see
        # standing plan Phase 3 "frontend test foundation"). Hard-gates
        # CI: a failing frontend test blocks merge.
        run: npm test

      - name: ESLint
        # Soft-failing for now since we haven't audited lint warnings —
        # `|| true` keeps CI green while we work through the backlog.
        # Remove once ESLint exits 0 on a clean checkout.
        run: npm run lint || true

  review:
    name: Known-bug regex linter
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scripts/review.py
        # Scans the whole repo for known-bug patterns we've explicitly
        # hit before (silent edit drops, missing utf-8 encoding, bare
        # except clauses, direct store setState, etc.). Exits 1 on any
        # P0 finding — those are blockers. P1/P2 are reported but not
        # gated since most P1 findings on main today are documented
        # tech debt (direct setState calls) we're working through.
        run: python scripts/review.py --all
